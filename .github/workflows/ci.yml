name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: ./scripts/ci.sh install-deps

      - name: Format + clippy
        run: ./scripts/ci.sh check

      - name: Tests + doctests
        run: ./scripts/ci.sh test

  release-build:
    name: Release build (Linux)
    runs-on: ubuntu-22.04
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build + smoke test release MCP binary
        run: ./scripts/ci.sh release-smoke

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: projectmind-mcp-linux
          path: target/release/projectmind-mcp
          retention-days: 7
