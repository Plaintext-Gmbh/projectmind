name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: ./scripts/ci.sh install-deps

      # tauri::generate_context!() validates frontendDist: "../dist" at compile
      # time. Without app/dist, clippy panics on the projectmind-app crate.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Build frontend (required for tauri::generate_context!)
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Format + clippy
        run: ./scripts/ci.sh check

      - name: Tests + doctests
        run: ./scripts/ci.sh test

  release-build:
    name: Release build (Linux)
    runs-on: ubuntu-22.04
    needs: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build + smoke test release MCP binary
        run: ./scripts/ci.sh release-smoke

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: projectmind-mcp-linux
          path: target/release/projectmind-mcp
          retention-days: 7
