name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Doc-tests
        run: cargo test --workspace --doc

  release-build:
    name: Release build (Linux)
    runs-on: ubuntu-22.04
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release MCP server
        run: cargo build --release --bin plaintext-ide-mcp
      - name: Smoke test
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | ./target/release/plaintext-ide-mcp \
            | grep -q '"name":"plaintext-ide-mcp"'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plaintext-ide-mcp-linux
          path: target/release/plaintext-ide-mcp
          retention-days: 7
