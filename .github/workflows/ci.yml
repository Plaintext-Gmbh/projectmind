name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

# Workflow runs only ever read the repo and write to the cache — no need
# for GITHUB_TOKEN write scopes anywhere here.
permissions:
  contents: read

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: ./scripts/ci.sh install-deps

      # tauri::generate_context!() validates frontendDist: "../dist" at compile
      # time. Without app/dist, clippy panics on the projectmind-app crate.
      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Build frontend (required for tauri::generate_context!)
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Format + clippy
        run: ./scripts/ci.sh check

      - name: Tests + doctests
        run: ./scripts/ci.sh test

  release-build:
    name: Release build (Linux)
    runs-on: ubuntu-22.04
    needs: rust
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build + smoke test release MCP binary
        run: ./scripts/ci.sh release-smoke

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: projectmind-mcp-linux
          path: target/release/projectmind-mcp
          retention-days: 7
