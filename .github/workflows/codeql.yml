name: CodeQL (advanced)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-scan to catch newly discovered patterns in the latest CodeQL
    # query packs even when the source is quiet.
    - cron: '37 4 * * 1'

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    permissions:
      security-events: write
      packages: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            os: ubuntu-22.04
          - language: rust
            os: ubuntu-22.04
          - language: actions
            os: ubuntu-22.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Skip generated / vendored / 3rd-party JS so CodeQL doesn't flag
          # findings in minified Mermaid bundles or in dist/ build output.
          config: |
            paths-ignore:
              - app/dist/**
              - app/node_modules/**
              - target/**

      # Rust + JS/TS need autobuild so CodeQL can extract semantic info.
      # Frontend autobuild needs the SPA built (same generate_context!()
      # constraint as the regular CI workflow).
      - name: Install pnpm
        if: matrix.language == 'javascript-typescript' || matrix.language == 'rust'
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - name: Setup Node
        if: matrix.language == 'javascript-typescript' || matrix.language == 'rust'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Build frontend
        if: matrix.language == 'javascript-typescript' || matrix.language == 'rust'
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Autobuild
        if: matrix.language != 'rust'
        uses: github/codeql-action/autobuild@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3

      - name: Build Rust for CodeQL
        if: matrix.language == 'rust'
        run: cargo build --workspace --exclude projectmind-app

      - name: Analyze
        uses: github/codeql-action/analyze@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        with:
          category: /language:${{ matrix.language }}
