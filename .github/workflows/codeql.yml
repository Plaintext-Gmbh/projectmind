name: codeqlAdvanced

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-scan to catch newly discovered patterns in the latest CodeQL
    # query packs even when the source is quiet.
    - cron: '37 4 * * 1'

jobs:
  analyze:
    name: analyze / ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    permissions:
      security-events: write
      packages: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            os: ubuntu-22.04
          - language: rust
            os: ubuntu-22.04
          - language: actions
            os: ubuntu-22.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c3f298df8c1fea2fefe20c785e6aa00f32df8260 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Skip generated / vendored / 3rd-party JS so CodeQL doesn't flag
          # findings in minified Mermaid bundles or in dist/ build output.
          config: |
            paths-ignore:
              - app/dist/**
              - app/node_modules/**
              - target/**

      # Rust + JS/TS need autobuild so CodeQL can extract semantic info.
      # Frontend autobuild needs the SPA built (same generate_context!()
      # constraint as the regular CI workflow).
      - name: Install pnpm
        if: matrix.language == 'javascript-typescript' || matrix.language == 'rust'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 9

      - name: Setup Node
        if: matrix.language == 'javascript-typescript' || matrix.language == 'rust'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Build frontend
        if: matrix.language == 'javascript-typescript' || matrix.language == 'rust'
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Autobuild
        if: matrix.language != 'rust'
        uses: github/codeql-action/autobuild@c3f298df8c1fea2fefe20c785e6aa00f32df8260 # v4.35.3

      - name: Build Rust for CodeQL
        if: matrix.language == 'rust'
        run: cargo build --workspace --exclude projectmind-app

      - name: Analyze
        uses: github/codeql-action/analyze@c3f298df8c1fea2fefe20c785e6aa00f32df8260 # v4.35.3
        with:
          category: /language:${{ matrix.language }}
