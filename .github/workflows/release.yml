name: Release

# Two trigger paths into the same workflow file:
#
# 1. **Tag push** (`push.tags = v*.*.*`) — the canonical entry point. Builds
#    the MCP server + Tauri app for every supported platform and publishes
#    a GitHub Release with the artefacts attached.
#
# 2. **Manual dispatch** with a `bump` input — opens a `release/vX.Y.Z` PR
#    that bumps every version reference. After you merge that PR and push
#    the matching tag, path 1 above kicks in and ships the binaries.
#
# The `bump` step needs the org-level
# *Allow GitHub Actions to create and approve pull requests* setting to be
# on; otherwise it fails with `GraphQL: GitHub Actions is not permitted`.
# When that's not available, a maintainer can do the same flow by hand:
#   1. bump versions in Cargo.toml + app/package.json + app/src-tauri/*
#      + crates/{mcp-server,browser-host}/Cargo.toml
#   2. open + merge a PR
#   3. `git tag vX.Y.Z origin/master && git push origin vX.Y.Z`

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (patch / minor / major). Leave empty to skip — useful for re-running the build matrix on the latest tag.'
        required: false
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  # -- Bump path -------------------------------------------------------------
  # Only fires on workflow_dispatch with a non-empty `bump`. Bumps every
  # version reference, pushes a release/vX.Y.Z branch, opens a PR. Once the
  # PR is merged and a tag pushed, the build+publish path below takes over.
  bump:
    name: Bump version + open PR
    if: github.event_name == 'workflow_dispatch' && inputs.bump != ''
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: ver
        run: |
          set -euo pipefail
          current=$(grep -m1 -E '^version = "' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Cannot parse current version: '$current'"; exit 1
          fi
          IFS=. read -r maj min pat <<< "$current"
          case "${{ inputs.bump }}" in
            major) new="$((maj+1)).0.0" ;;
            minor) new="${maj}.$((min+1)).0" ;;
            patch) new="${maj}.${min}.$((pat+1))" ;;
            *) echo "::error::unknown bump: ${{ inputs.bump }}"; exit 1 ;;
          esac
          echo "current=$current"     >> "$GITHUB_OUTPUT"
          echo "new=$new"             >> "$GITHUB_OUTPUT"
          echo "tag=v$new"            >> "$GITHUB_OUTPUT"
          echo "branch=release/v$new" >> "$GITHUB_OUTPUT"
          echo "::notice::Bumping ${current} → ${new}"

      - name: Update version files
        env:
          CURRENT: ${{ steps.ver.outputs.current }}
          NEW:     ${{ steps.ver.outputs.new }}
        run: |
          set -euxo pipefail
          for f in Cargo.toml app/src-tauri/Cargo.toml crates/mcp-server/Cargo.toml crates/browser-host/Cargo.toml; do
            sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/g" "$f"
          done
          for f in app/package.json app/src-tauri/tauri.conf.json; do
            sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW\"/" "$f"
          done

      - name: Open release PR
        env:
          GH_TOKEN: ${{ github.token }}
          NEW: ${{ steps.ver.outputs.new }}
          TAG: ${{ steps.ver.outputs.tag }}
          BRANCH: ${{ steps.ver.outputs.branch }}
        run: |
          set -euo pipefail
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(release): bump version to ${NEW}"
          git push -u origin "$BRANCH"
          body=$(printf '%s\n\n%s\n\n%s\n' \
            "Automated release bump to **${NEW}**." \
            "Merge this PR, then push the tag: \`git tag ${TAG} origin/master && git push origin ${TAG}\`. The Release workflow will pick up the tag-push and build+publish the binaries." \
            "If \`gh pr create\` fails with \"GitHub Actions is not permitted to create or approve pull requests\", enable the corresponding setting under Org → Settings → Actions → General.")
          gh pr create \
            --title "chore(release): ${TAG}" \
            --body  "$body" \
            --base master --head "$BRANCH"

  # -- Build path ------------------------------------------------------------
  # Two parallel matrices that publish into the same GitHub Release at the
  # end:
  #  * mcp — the standalone MCP server binary.
  #  * app — the Tauri desktop bundle (.dmg/.app on macOS, .deb/.AppImage on
  #          Linux, .msi/.exe on Windows).

  mcp:
    name: MCP server / ${{ matrix.asset_suffix }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset_suffix: macos-arm64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release MCP binary
        shell: bash
        run: ./scripts/ci.sh release-build ${{ matrix.target }}

      - name: Package
        shell: bash
        run: ./scripts/ci.sh release-package ${{ matrix.target }} ${{ matrix.asset_suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: projectmind-mcp-${{ matrix.asset_suffix }}
          path: |
            projectmind-mcp-${{ matrix.asset_suffix }}.tar.gz
            projectmind-mcp-${{ matrix.asset_suffix }}.tar.gz.sha256
          retention-days: 30

  app:
    name: Desktop app / ${{ matrix.asset_suffix }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary covers both Apple Silicon and Intel in
          # one bundle so we only need one Mac runner. The `extra_targets`
          # hack tells rust-toolchain to add the second arch.
          - os: macos-14
            target: universal-apple-darwin
            extra_targets: x86_64-apple-darwin
            asset_suffix: macos-universal
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}${{ matrix.extra_targets && format(',{0}', matrix.extra_targets) || '' }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: app-${{ matrix.asset_suffix }}

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Linux Tauri build deps
        if: runner.os == 'Linux'
        shell: bash
        run: ./scripts/ci.sh install-deps

      - name: Install JS deps
        shell: bash
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build app bundle
        shell: bash
        run: ./scripts/ci.sh app-build ${{ matrix.target }}

      - name: Package
        shell: bash
        run: ./scripts/ci.sh app-package ${{ matrix.target }} ${{ matrix.asset_suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: projectmind-app-${{ matrix.asset_suffix }}
          path: |
            projectmind-app-${{ matrix.asset_suffix }}.tar.gz
            projectmind-app-${{ matrix.asset_suffix }}.tar.gz.sha256
          retention-days: 30

  publish:
    name: Publish GitHub release
    needs: [mcp, app]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
