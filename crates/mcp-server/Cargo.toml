[package]
name = "plaintext-ide-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "MCP server exposing plaintext-ide tools to LLM agents (Claude Code, etc.)."

[[bin]]
name = "plaintext-ide-mcp"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
plaintext-ide-plugin-api = { workspace = true }
plaintext-ide-core       = { workspace = true }

# Local plugins linked statically for Phase 1
plaintext-ide-lang-java         = { path = "../../plugins/lang-java", version = "0.1.0" }
plaintext-ide-framework-spring  = { path = "../../plugins/framework-spring", version = "0.1.0" }

anyhow      = { workspace = true }
clap        = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }
